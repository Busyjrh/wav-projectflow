<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>WAV ProjectFlow Studio v3.1 Mobile</title>
<style>
:root{--o:#e45a23;--t:#078caf;--i:#211f20;--p:#fff;--s:#f4f5f3;--l:#deded9;--m:#6e6c6d;--g:#2f7958;--a:#a66c00;--r:#a93c32;--sh:0 14px 35px #00000012}*{box-sizing:border-box}body{margin:0;font:14px Arial,sans-serif;background:#ececea;color:var(--i)}button,input,select,textarea{font:inherit}button{cursor:pointer}.hidden{display:none!important}.top{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--l);padding:10px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}.brand{display:flex;align-items:center;gap:10px;min-width:220px}.brand img{width:105px;height:54px;object-fit:contain}.brand b{display:block}.brand small{color:var(--m)}.grow{flex:1}.toolbar,.timer,.viewbar{display:flex;gap:7px;align-items:center;flex-wrap:wrap}.timer{background:var(--i);color:#fff;border-radius:10px;padding:7px}.timer select{width:135px}.clock{font-weight:900;font-size:18px;min-width:86px;text-align:center}.btn{border:1px solid var(--l);background:#fff;border-radius:8px;padding:9px 11px;font-weight:800}.btn.o{background:var(--o);border-color:var(--o);color:#fff}.btn.t{background:var(--t);border-color:var(--t);color:#fff}.btn.d{background:var(--i);color:#fff;border-color:var(--i)}select,input,textarea{width:100%;padding:10px;border:1px solid var(--l);border-radius:8px;background:#fbfbfa}.layout{display:grid;grid-template-columns:230px 1fr;min-height:calc(100vh - 76px)}aside{background:var(--i);padding:14px 10px;color:#fff;position:sticky;top:76px;height:calc(100vh - 76px);overflow:auto}aside .label{font-size:9px;letter-spacing:.14em;color:#858082;text-transform:uppercase;padding:14px 9px 5px}aside button{display:block;width:100%;text-align:left;border:0;background:transparent;color:#ddd;padding:10px;border-radius:7px;font-weight:700}aside button.active{background:var(--o);color:#fff}main{padding:22px;max-width:1500px;width:100%;margin:auto}.hero,.panel{background:#fff;border-radius:14px;box-shadow:var(--sh);margin-bottom:14px}.hero{padding:24px;position:relative;overflow:hidden}.hero:after{content:"";position:absolute;right:-50px;top:-40px;width:240px;height:180px;background:linear-gradient(135deg,var(--t),var(--o));transform:rotate(18deg);opacity:.92}.hero>*{position:relative;z-index:1;max-width:880px}.hero h1{margin:5px 0;font-size:34px}.hero p{color:var(--m);line-height:1.55}.eyebrow{font-size:10px;color:var(--t);font-weight:900;letter-spacing:.14em;text-transform:uppercase}.panel{padding:18px;border:1px solid var(--l)}.panel h2{margin:0 0 5px}.lead{color:var(--m);font-size:12px;line-height:1.5}.grid{display:grid;gap:12px}.g2{grid-template-columns:repeat(2,minmax(0,1fr))}.g3{grid-template-columns:repeat(3,minmax(0,1fr))}.g4{grid-template-columns:repeat(4,minmax(0,1fr))}.metrics{display:grid;grid-template-columns:repeat(6,1fr);gap:9px;margin:14px 0}.metric{background:#f1f1ee;padding:12px;border-radius:10px}.metric span{display:block;font-size:9px;color:var(--m);text-transform:uppercase;font-weight:900}.metric b{font-size:22px;display:block;margin-top:5px}.card{border:1px solid var(--l);border-radius:11px;padding:13px;margin-top:9px}.card h3{margin:0 0 6px}.meta{font-size:11px;color:var(--m);line-height:1.5}.tag{display:inline-block;border-radius:999px;padding:5px 8px;font-size:9px;font-weight:900;margin:6px 4px 0 0;background:#eee}.tag.o{background:#fff0e8;color:#9d3d16}.tag.t{background:#e4f6fa;color:#08687d}.tag.g{background:#e2f0e7;color:#256949}.tag.r{background:#f8e1df;color:#922d27}.tag.a{background:#fff1d3;color:#895d00}.callout{padding:13px;border-left:5px solid var(--t);background:#eaf7fa;border-radius:9px;line-height:1.55}.callout.warn{border-color:var(--a);background:#fff4dc}.callout.hot{border-color:var(--o);background:#fff1e9}.tabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:13px}.tabs button{border:1px solid var(--l);background:#fff;padding:8px 10px;border-radius:999px;font-weight:800}.tabs button.active{background:var(--i);color:#fff}.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}.dayHead{font-size:10px;font-weight:900;text-align:center;color:var(--m)}.day{min-height:105px;background:#fafaf8;border:1px solid var(--l);border-radius:9px;padding:7px}.day.off{opacity:.35}.date{font-weight:900}.event{font-size:10px;padding:5px;border-radius:6px;background:#e4f6fa;margin-top:5px}.event.due{background:#fff0e8}.event.wait{background:#fff1d3}.roleCard{border-top:6px solid var(--t)}.roleCard.editor{border-color:var(--o)}.roleCard.client{border-color:var(--g)}.roleCard.owner{border-color:var(--i)}.simple .advanced{display:none}.simple aside button[data-advanced="1"]{display:none}.simple .metrics{grid-template-columns:repeat(4,1fr)}.modalback{position:fixed;inset:0;background:#0009;z-index:50;display:flex;align-items:center;justify-content:center;padding:18px}.modal{background:#fff;border-radius:14px;max-width:760px;width:100%;max-height:90vh;overflow:auto;padding:20px}.field span{display:block;font-size:9px;text-transform:uppercase;color:var(--m);font-weight:900;margin-bottom:5px}.empty{padding:22px;text-align:center;color:var(--m);border:1px dashed var(--l);border-radius:10px}.progress{height:10px;border-radius:99px;background:#e3e3df;overflow:hidden}.progress i{display:block;height:100%;background:linear-gradient(90deg,var(--t),var(--o))}.check{display:flex;gap:8px;align-items:flex-start}.check input{width:auto;margin-top:3px}.pre{white-space:pre-wrap;font:12px ui-monospace,monospace;background:#f5f5f2;padding:13px;border-radius:9px;max-height:420px;overflow:auto}.toast{position:fixed;right:18px;bottom:18px;background:var(--i);color:#fff;padding:12px 15px;border-radius:8px;z-index:80}@media(max-width:950px){.layout{grid-template-columns:190px 1fr}.metrics{grid-template-columns:repeat(3,1fr)}.g3,.g4{grid-template-columns:repeat(2,1fr)}}@media(max-width:700px){.layout{display:block}aside{height:auto;position:sticky;top:0;display:flex;overflow:auto;z-index:15;padding:7px}aside .label{display:none}aside button{white-space:nowrap;width:auto}.g2,.g3,.g4{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,1fr)}main{padding:12px}.hero h1{font-size:27px}.calendar{grid-template-columns:repeat(7,110px);overflow:auto}.day{min-height:95px}}

<style id="v3styles">
.portfolio-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:12px}.project-tile{background:#fff;border:1px solid var(--l);border-radius:14px;padding:16px;position:relative;overflow:hidden}.project-tile:before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--t)}.project-tile.active:before{background:var(--o)}.progressbar{height:10px;background:#e6e6e2;border-radius:99px;overflow:hidden;margin:9px 0}.progressbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--t),var(--o));border-radius:99px}.split-progress{display:grid;grid-template-columns:160px 1fr;align-items:center;gap:10px;margin:9px 0}.asset-row,.version-row,.history-row{display:grid;grid-template-columns:minmax(200px,1.5fr) minmax(130px,.8fr) minmax(120px,.7fr) auto;gap:10px;align-items:center;border-top:1px solid var(--l);padding:12px 0}.asset-row:first-child,.version-row:first-child{border-top:0}.status-dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--m);margin-right:6px}.status-dot.good{background:var(--g)}.status-dot.warn{background:var(--a)}.status-dot.hot{background:var(--o)}.audience-pill{font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:900;padding:4px 7px;border-radius:99px;background:#eaf5f8;color:#056b86}.audience-pill.private{background:#eee;color:#333}.approval-actions{display:flex;gap:5px;flex-wrap:wrap}.mini{padding:6px 8px;font-size:11px}.money{font-variant-numeric:tabular-nums}.question-card{border-left:5px solid var(--a)}.question-card.answered{border-left-color:var(--g);opacity:.75}.timeline{position:relative;padding-left:26px}.timeline:before{content:"";position:absolute;left:8px;top:5px;bottom:5px;width:2px;background:var(--l)}.history-row{display:block;position:relative;padding:10px 0 14px 8px}.history-row:before{content:"";position:absolute;left:-22px;top:15px;width:10px;height:10px;border-radius:50%;background:var(--t);border:3px solid white;box-shadow:0 0 0 1px var(--l)}.private-banner{background:#211f20;color:#fff;border-radius:10px;padding:10px 13px;margin-bottom:12px}.dropbox-box{border:2px dashed #1683ff;background:#f4f9ff;border-radius:14px;padding:20px;text-align:center}.dropbox-box b{display:block;font-size:18px;margin-bottom:4px}.dropbox-box .btn{margin-top:10px}.phase-lane{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.phase{background:#f4f5f3;border:1px solid var(--l);padding:10px;border-radius:10px;text-align:center}.phase.active{background:#fff2ec;border-color:var(--o)}@media(max-width:850px){.asset-row,.version-row{grid-template-columns:1fr}.phase-lane{grid-template-columns:1fr 1fr}.split-progress{grid-template-columns:1fr}}
</style>

roadmap:()=>hero('Story & Production Roadmap','See the film as a journey, not a flat task list.')+panel('HISTORY film arc','The current creative structure.',cards([{title:'Opening — The Journey of a Spark',status:'Active',notes:'Curiosity → ignition → depth → cosmic expansion → GEM identity.'},{title:'Chapter 1 — An Offer Too Good to Refuse',status:'Requested',notes:'National need, 1972 call to action, first fellows, belonging and adversity.'},{title:'Chapter 2 — If You Build It… Will They Come?',status:'Requested',notes:'Execution, leadership, growth, infrastructure, Howard Adams.'},{title:'Chapter 3 — See a Milestone… Be a Milestone',status:'Requested',notes:'Scale, high-achieving fellows, expanding impact, milestones as stars.'},{title:'Chapter 4 — Don’t Pay It Back, Pay It Forward',status:'Requested',notes:'Legacy becomes service, philanthropy, mentorship, community.'},{title:'Chapter 5 — Hmm… Nice Opening Act. Now What?',status:'Confirm',notes:'Present in storyboard; not included in latest requested chapter-animation list.'},{title:'Closing — Spark to Infinity',status:'Revision',notes:'Dates constellation → orange GEM logo → congratulations → shuttle → space.'}])) ,

creative:()=>hero('Creative Studio','Visual language, animation concepts, and story-support ideas kept together.')+panel('Spark system','One theme, several distinct behaviors.',cards(p().ideas))+panel('Suggested creative rules','Consistency without sameness.',`<div class="grid g3"><div class="callout"><b>Motion rule</b><br>Every sequence begins with energy traveling with intention—not decorative particles drifting randomly.</div><div class="callout"><b>Science rule</b><br>Use diagrams, grids, molecules, circuits, equations, labs, and orbital paths as evidence of STEM—not generic “tech” overlays.</div><div class="callout"><b>Emotion rule</b><br>Let the spark evolve: curiosity → urgency → construction → achievement → generosity → infinity.</div></div>`),
people:()=>hero('People & Lower Thirds','Track every person, spelling, title, chapter, and approval state.')+panel('Lower-third roster','Storyboard references are not the same as final approved IDs.',p().people.map(x=>`<div class="card"><h3>${esc(x.name)}</h3><div class="meta">${esc(x.title)}<br>${esc(x.chapter)}</div><span class="tag ${x.status.includes('confirm')?'a':'t'}">${esc(x.status)}</span></div>`).join('')),
music:()=>hero('Music Direction','Keep internal creation private while managing emotional purpose and delivery.')+panel('Recommended emotional map','Music should support the story, not make history feel like homework.',cards([{title:'Opening curiosity pulse',type:'Opening',detail:'Restrained rhythmic tension, subtle electrical texture, wonder rather than trailer bombast.'},{title:'Foundation and struggle',type:'Chapter 1',detail:'Purposeful forward motion with warmth; make the need feel urgent but human.'},{title:'Building momentum',type:'Chapter 2',detail:'Mechanical pulse and accumulating layers to suggest organization becoming real.'},{title:'Milestone lift',type:'Chapter 3',detail:'Broader harmonic rise and more expansive instrumentation as impact grows.'},{title:'Legacy and service',type:'Chapter 4',detail:'Emotional, grounded, generous; avoid sentimentality.'},{title:'Cosmic finish',type:'Closing',detail:'Expansive optimism with a clear ascent, leaving room for logo and final sound bite.'}])) ,

portal:()=>hero('Portal Views','One project record, three different windows.')+`<div class="grid g3">${panel('Jerome View','Everything: strategy, private methods, profitability, AI suggestions, files, time, and risks.','<div class="callout">Full command center. Nothing is hidden.</div>','roleCard owner')}${panel('Nathaniel View','Detailed collaborator view: deliverables, approvals, requests, links, schedule, and blockers.','<div class="callout">No profitability or private music-generation workflow.</div>','roleCard editor')}${panel('Paula / Client View','Calm progress view: milestones, due dates, current status, approved previews, and what is needed from client.','<div class="callout">No internal experiments, raw suggestions, or production clutter.</div>','roleCard client')}</div>`+panel('How login would work later','This standalone file can simulate roles now. Real separate logins require hosting plus authentication and a shared database.',`<div class="callout warn">For now, use the role selector above to test exactly what each person should see. Dropbox, Frame.io, Google Drive, or PDF links can be stored immediately. Direct file uploads and true accounts should come after the workflow is proven.</div>`),
time:()=>hero('Time & Labor','Track actual effort by creative category and compare it with the estimate.')+panel('Summary','Persistent timer stays available on every page.',`<div class="metrics"><div class="metric"><span>Total</span><b>${(p().time.reduce((a,b)=>a+b.ms,0)/3600000).toFixed(1)}h</b></div><div class="metric"><span>Estimated</span><b>${p().estimatedHours}h</b></div><div class="metric"><span>Remaining</span><b>${Math.max(0,p().estimatedHours-p().time.reduce((a,b)=>a+b.ms,0)/3600000).toFixed(1)}h</b></div></div>${p().time.length?p().time.map(x=>`<div class="card"><h3>${esc(x.cat)}</h3><div class="meta">${(x.ms/3600000).toFixed(2)} hours • ${fmt(x.date)}</div></div>`).join(''):'<div class="empty">No time recorded yet.</div>'}`),
files:()=>hero('Files & Links','Use links now; add direct uploads only after hosting and storage are chosen.')+panel('Project locations and references','Dropbox, Google Drive, Frame.io, PDF, NAS paths, hard drives, and exports.',`<button class="btn o" data-add="file">Add Link / Location</button>${p().files.length?p().files.map(x=>`<div class="card"><h3>${esc(x.label)}</h3><div class="meta">${esc(x.url)}<br>${esc(x.notes)}</div></div>`).join(''):'<div class="empty">No project links or locations yet.</div>'}`),
ai:()=>hero('AI Workbench','Bring structured project context back to ChatGPT without exposing private notes to collaborators.')+panel('Project packet','Copy this into ChatGPT when emails or requirements change.',`<button class="btn t" data-act="copy">Copy Packet</button><div class="pre" id="packet">${esc(packet())}</div>`),
settings:()=>hero('Project Settings','Edit the project identity and central guidance.')+panel('Core project information','Changes save locally in this browser.',`<div class="grid g2"><label class="field"><span>Project Name</span><input data-bind="name" value="${esc(p().name)}"></label><label class="field"><span>Deadline</span><input type="date" data-bind="deadline" value="${esc(p().deadline)}"></label><label class="field"><span>Goal</span><textarea data-bind="goal">${esc(p().goal)}</textarea></label><label class="field"><span>Best Next Action</span><textarea data-bind="next">${esc(p().next)}</textarea></label></div>`)};
function calendar(){let [Y,M]=state.month.split('-').map(Number),first=new Date(Y,M-1,1),start=new Date(Y,M-1,1-first.getDay()),heads=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(x=>`<div class="dayHead">${x}</div>`).join(''),cells='';for(let i=0;i<42;i++){let d=new Date(start);d.setDate(start.getDate()+i);let ds=d.toISOString().slice(0,10),ev=[...p().events,...p().requests.filter(x=>x.due).map(x=>({date:x.due,title:x.title,type:'due'})),...p().waiting.filter(x=>x.asked).map(x=>({date:x.asked,title:'Waiting: '+x.title,type:'wait'}))].filter(x=>x.date===ds);cells+=`<div class="day ${d.getMonth()!=M-1?'off':''}"><div class="date">${d.getDate()}</div>${ev.map(e=>`<div class="event ${e.type||''}">${esc(e.title)}</div>`).join('')}</div>`}return panel('July 2026','Monthly project schedule.',`<div class="calendar">${heads}${cells}</div>`)}
function packet(){let q=p();return `WAV PROJECTFLOW UPDATE\nProject: ${q.name}\nGoal: ${q.goal}\nPhase: ${q.phase}\nDeadline: ${q.deadline}\nBest next action: ${q.next}\n\nDELIVERABLES\n${q.requests.map(x=>`- ${x.title} | ${x.status} | ${x.approval} | ${x.notes}`).join('\n')}\n\nWAITING ON\n${q.waiting.map(x=>`- ${x.title} — ${x.person}: ${x.impact}`).join('\n')}\n\nCREATIVE LANGUAGE\n${q.ideas.map(x=>`- ${x.title}: ${x.detail}`).join('\n')}\n\nPlease extract new tasks, approvals, dependencies, scope changes, and the single best next action.`}
function render(){document.body.classList.toggle('simple',state.simple);$('#projectSelect').innerHTML=state.projects.map(x=>`<option value="${x.id}" ${x.id===state.active?'selected':''}>${esc(x.name)}</option>`).join('');$('#roleSelect').value=state.role;$('#simpleBtn').textContent=state.simple?'Full View':'Simple View';$('#timerCat').innerHTML=CATS.map(x=>`<option>${x}</option>`).join('');document.querySelectorAll('[data-page]').forEach(b=>b.classList.toggle('active',b.dataset.page===page));$('#main').innerHTML=(pages[page]||pages.dashboard)()}
function modal(content){$('#modal').innerHTML=`<div class="modalback"><div class="modal">${content}</div></div>`}function close(){$('#modal').innerHTML=''}
function editReq(id){let x=p().requests.find(a=>a.id===id);modal(`<h2>Edit Deliverable</h2><div class="grid g2"><label class="field"><span>Title</span><input id="et" value="${esc(x.title)}"></label><label class="field"><span>Status</span><select id="es">${['Not started','Requested','Next','In Progress','Revision','Blocked','Parked','Complete'].map(v=>`<option ${v===x.status?'selected':''}>${v}</option>`).join('')}</select></label><label class="field"><span>Approval</span><select id="ea">${['Not sent','Awaiting info','Sent for review','Changes requested','Approved','Not active'].map(v=>`<option ${v===x.approval?'selected':''}>${v}</option>`).join('')}</select></label><label class="field"><span>Due</span><input id="ed" type="date" value="${x.due||''}"></label></div><label class="field"><span>Notes</span><textarea id="en">${esc(x.notes)}</textarea></label><div class="toolbar"><button class="btn" onclick="close()">Cancel</button><button class="btn o" id="saveEdit">Save</button></div>`);$('#saveEdit').onclick=()=>{x.title=$('#et').value;x.status=$('#es').value;x.approval=$('#ea').value;x.due=$('#ed').value;x.notes=$('#en').value;save('Updated');close();render()}}
function addReq(){modal(`<h2>Add Deliverable</h2><label class="field"><span>Title</span><input id="nt"></label><label class="field"><span>Notes</span><textarea id="nn"></textarea></label><div class="toolbar"><button class="btn" onclick="close()">Cancel</button><button class="btn o" id="ns">Add</button></div>`);$('#ns').onclick=()=>{p().requests.push({id:uid(),title:$('#nt').value,status:'Not started',approval:'Not sent',due:'',audience:'editor',notes:$('#nn').value});save('Added');close();render()}}
function addFile(){modal(`<h2>Add Link / Location</h2><label class="field"><span>Label</span><input id="fl"></label><label class="field"><span>URL or Path</span><input id="fu"></label><label class="field"><span>Notes</span><textarea id="fn"></textarea></label><div class="toolbar"><button class="btn" onclick="close()">Cancel</button><button class="btn o" id="fs">Add</button></div>`);$('#fs').onclick=()=>{p().files.push({label:$('#fl').value,url:$('#fu').value,notes:$('#fn').value});save('Added');close();render()}}
function tick(){let t=p().timer;$('#clock').textContent=t?h(Date.now()-t.start):'00:00:00'}setInterval(tick,1000);
document.addEventListener('click',e=>{let b=e.target.closest('button');if(!b)return;if(b.dataset.page){page=b.dataset.page;render()}if(b.dataset.edit)editReq(b.dataset.edit);if(b.dataset.add==='request')addReq();if(b.dataset.add==='file')addFile();if(b.dataset.act==='export'){const a=document.createElement('a'),url=URL.createObjectURL(new Blob([JSON.stringify(WAVShared.makeBackup(state),null,2)],{type:'application/json'}));a.href=url;a.download='WAV_ProjectFlow_Complete_Backup.json';a.hidden=true;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1500);toast('Complete backup downloaded')}if(b.dataset.act==='import')$('#file').click();if(b.dataset.act==='copy')navigator.clipboard.writeText(packet()).then(()=>toast('Packet copied'));if(b.dataset.act==='new'){openNewProjectWizard()}})
$('#projectSelect').onchange=e=>{state.active=e.target.value;save();render()};$('#roleSelect').onchange=e=>{state.role=e.target.value;save();render()};$('#simpleBtn').onclick=()=>{state.simple=!state.simple;save();render()};$('#start').onclick=()=>{if(p().timer)return toast('Timer already running');p().timer={start:Date.now(),cat:$('#timerCat').value};save('Timer started');tick()};$('#stop').onclick=()=>{if(!p().timer)return toast('No active timer');let t=p().timer;p().time.push({date:today(),cat:t.cat,ms:Date.now()-t.start});p().timer=null;save('Time saved');render();tick()};$('#file').onchange=e=>{let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{state=WAVShared.restoreBackup(JSON.parse(r.result));save('Complete backup imported');render()}catch(err){alert('Invalid ProjectFlow backup')}};r.readAsText(f)};document.addEventListener('change',e=>{if(e.target.dataset.bind){p()[e.target.dataset.bind]=e.target.value;save('Saved')}});render();tick();
</script>

  state.projects.forEach(migrateProject);save();
  const workLabel=[...document.querySelectorAll('aside .label')].find(x=>x.textContent.includes('Work'));
  const nav=workLabel&&workLabel.parentNode;
  function addNav(label,pageName,beforeLabel){
    if(document.querySelector('[data-page="'+pageName+'"]'))return;

  function audienceOK(x){return state.role==='owner'||(state.role==='editor'&&x.audience!=='owner')||(state.role==='client'&&x.audience==='client')}
  function phaseProgress(q){return Math.round((q.progress.development+q.progress.assets+q.progress.production+q.progress.approvals+q.progress.delivery)/5)}
  function pctRow(label,val){return `<div class="split-progress"><b>${esc(label)}</b><div><div class="progressbar"><i style="width:${Math.max(0,Math.min(100,val))}%"></i></div><small>${val}%</small></div></div>`}
  pages.portfolio=()=>hero('WAV Portfolio Dashboard','Your projects, next moves, deadlines, and risk—before you enter any one project.')+panel('Active portfolio','Only Jerome can switch across the WAV project portfolio.',`<div class="toolbar"><button class="btn o" data-v3add="project">Add Project</button></div><div class="portfolio-grid">${state.projects.map(q=>`<div class="project-tile ${q.id===state.active?'active':''}"><div class="eyebrow">${esc(q.phase)}</div><h2>${esc(q.name)}</h2><p>${esc(q.focus||q.goal)}</p><div class="progressbar"><i style="width:${phaseProgress(q)}%"></i></div><div class="meta">Overall maturity ${phaseProgress(q)}% • Requested ${fmt(q.requestedDeadline)}</div><div class="callout ${q.waiting.filter(x=>x.status==='Waiting').length?'warn':''}"><b>Next:</b> ${esc(q.next)}</div><button class="btn t" data-openproject="${q.id}">Open Project</button></div>`).join('')}</div>`);
  pages.assets=()=>hero('Asset Exchange','Request files through Dropbox and deliver versions through controlled links without storing media inside ProjectFlow.')+panel('Incoming asset requests','Each request has a destination, dependency, and receipt state.',`<button class="btn o" data-v3add="asset">New Asset Request</button>${p().assetRequests.filter(audienceOK).map(a=>`<div class="asset-row"><div><b>${esc(a.title)}</b><div class="meta">From ${esc(a.from)} • ${esc(a.area)}<br>${esc(a.requirements)}</div></div><div><span class="status-dot ${a.received?'good':'warn'}"></span>${esc(a.received?'Received':a.status)}<br><small>Blocks: ${esc(a.blocks)}</small></div><div>${a.due?`Due ${fmt(a.due)}`:'No date set'}<br><span class="audience-pill ${a.audience==='owner'?'private':''}">${esc(a.audience)}</span></div><div class="approval-actions">${a.dropbox?`<a class="btn t mini" target="_blank" href="${esc(a.dropbox)}">Upload to Dropbox</a>`:`<button class="btn mini" data-editasset="${a.id}">Add Dropbox Link</button>`}<button class="btn mini" data-toggleasset="${a.id}">${a.received?'Undo received':'Mark received'}</button></div></div>`).join('')}`)+panel('How the upload handoff works','ProjectFlow stores the request and link; Dropbox securely receives the file.',`<div class="dropbox-box"><b>Drop assets into the correct project folder</b><span>Paste a Dropbox File Request link into any request. The user clicks once, selects files from their device, and Dropbox handles the upload.</span></div>`)+panel('Outgoing deliverables','Versions sent for review stay separate from incoming client assets.',`<button class="btn o" data-v3add="version">Add Version / Export</button>${p().versions.filter(audienceOK).map(v=>`<div class="version-row"><div><b>${esc(v.title)}</b><div class="meta">${esc(v.deliverable)} • ${esc(v.version)}<br>${esc(v.notes)}</div></div><div>${fmt(v.date)}<br><small>Review: ${esc(v.reviewer)}</small></div><div><span class="tag">${esc(v.status)}</span></div><div>${v.url?`<a class="btn t mini" target="_blank" href="${esc(v.url)}">Open</a>`:`<button class="btn mini" data-editversion="${v.id}">Add link</button>`}</div></div>`).join('')}`);
  pages.versions=()=>hero('Versions & Review','Every approval belongs to a specific version, reviewer, and date.')+panel('Review register','Never overwrite the project history.',`<button class="btn o" data-v3add="version">Add Version</button>${p().versions.filter(audienceOK).map(v=>`<div class="card"><div class="eyebrow">${esc(v.deliverable)} • ${esc(v.version)}</div><h3>${esc(v.title)}</h3><div class="meta">Sent ${fmt(v.date)} • Reviewer: ${esc(v.reviewer)}<br>${esc(v.notes)}</div><div class="toolbar"><span class="tag ${v.status.includes('Approved')?'t':v.status.includes('Changes')?'r':'a'}">${esc(v.status)}</span>${v.url?`<a class="btn mini" target="_blank" href="${esc(v.url)}">Open Review Link</a>`:''}${state.role!=='client'?`<button class="btn mini" data-review="${v.id}" data-status="Changes requested">Changes</button><button class="btn mini" data-review="${v.id}" data-status="Approved by ${state.role==='owner'?'Jerome':'Nathaniel'}">Approve</button>`:''}</div></div>`).join('')}`)+panel('Approval ladder','Approval must state who approved what.',`<div class="phase-lane"><div class="phase active">Internal review</div><div class="phase">Ready for Nathaniel</div><div class="phase">Nathaniel approved</div><div class="phase">Ready for Paula</div><div class="phase">Client approved / Final</div></div>`);
  pages.clarifications=()=>hero('Clarifications Needed','Questions the system believes should be answered before more work or rework occurs.')+panel('Open questions','Important, contextual, and intentionally calmer than “urgent.”',`<button class="btn o" data-v3add="question">Add Question</button>${p().clarifications.map(q=>`<div class="card question-card ${q.status==='Answered'?'answered':''}"><h3>${esc(q.question)}</h3><div class="meta">Ask: ${esc(q.ask)}<br><b>Why it matters:</b> ${esc(q.impact)}</div><div class="toolbar"><span class="tag">${esc(q.status)}</span><button class="btn mini" data-togglequestion="${q.id}">${q.status==='Answered'?'Reopen':'Mark answered'}</button></div></div>`).join('')}`)+panel('Current best recommendation','What Jerome should establish next.',`<div class="callout hot"><b>Ask Nathaniel for one priority order and one technical-delivery answer.</b><br>First: which asset does his edit need first? Second: what exact specs should every animation use? Those two answers prevent the most immediate wasted work.</div>`);
  pages.economics=()=>state.role!=='owner'?hero('Private Area','This financial and production-method information is available only to Jerome.')+panel('Restricted','Switch to Jerome View to inspect project economics.','<div class="private-banner">Private WAV business intelligence</div>'):hero('Private Project Economics','Use real time and scope data to learn what this work should cost next time.')+`<div class="private-banner">Jerome-only. Never shown in Nathaniel or Paula views.</div>`+panel('Economics inputs','These values remain in the private project record.',`<div class="grid g3"><label class="field"><span>Project / package amount</span><input type="number" data-v3bind="budget" value="${p().budget}"></label><label class="field"><span>Amount paid</span><input type="number" data-v3bind="amountPaid" value="${p().amountPaid}"></label><label class="field"><span>Direct costs / allocation</span><input type="number" data-v3bind="directCosts" value="${p().directCosts}"></label><label class="field"><span>Reference hourly rate</span><input type="number" data-v3bind="hourlyReference" value="${p().hourlyReference}"></label><label class="field"><span>Estimated hours</span><input type="number" data-v3bind="estimatedHours" value="${p().estimatedHours}"></label></div>`)+(()=>{let hrs=p().time.reduce((a,b)=>a+b.ms,0)/3600000,net=p().budget-p().directCosts,rate=hrs?net/hrs:0,target=p().hourlyReference*p().estimatedHours;return panel('Business intelligence','Calculations update from your timer and scope.',`<div class="metrics"><div class="metric"><span>Tracked time</span><b>${hrs.toFixed(1)}h</b></div><div class="metric"><span>Effective rate</span><b class="money">$${rate.toFixed(2)}/h</b></div><div class="metric"><span>Target labor value</span><b class="money">$${target.toFixed(0)}</b></div><div class="metric"><span>Unpriced requests</span><b>${p().requests.filter(x=>['Revision','Requested'].includes(x.status)).length}</b></div></div><div class="callout ${rate&&rate<p().hourlyReference?'warn':''}"><b>Future pricing guidance:</b> Separate creative development, animation production, music options, and revision rounds into a package. The project currently mixes four different types of labor that should not be hidden inside one graphics rate.</div>`);})()+panel('Progress maturity','Production completion is not the same as development clarity.',pctRow('Development clarity',p().progress.development)+pctRow('Asset readiness',p().progress.assets)+pctRow('Production execution',p().progress.production)+pctRow('Approvals',p().progress.approvals)+pctRow('Final delivery',p().progress.delivery));
  pages.history=()=>hero('Project Activity History','A permanent record of what was requested, changed, delivered, approved, and decided.')+panel('Timeline','This becomes the project memory and future dispute protection.',`<button class="btn o" data-v3add="history">Add Activity</button><div class="timeline">${[...p().activity].sort((a,b)=>b.date.localeCompare(a.date)).map(a=>`<div class="history-row"><b>${esc(a.type)}</b> <span class="tag">${fmt(a.date)}</span><div class="meta">${esc(a.text)}</div></div>`).join('')}</div>`);

  const oldDashboard=pages.dashboard;
  pages.dashboard=()=>{let q=p(),overall=phaseProgress(q);return oldDashboard()+panel('Project maturity','A clearer picture than one guessed completion percentage.',pctRow('Development clarity',q.progress.development)+pctRow('Asset readiness',q.progress.assets)+pctRow('Production execution',q.progress.production)+pctRow('Approvals',q.progress.approvals)+pctRow('Final delivery',q.progress.delivery))+panel('Three-date reality','Requested, internal, and hard-dependency dates serve different purposes.',`<div class="metrics"><div class="metric"><span>Your target</span><b>${fmt(q.internalTarget)}</b></div><div class="metric"><span>Requested</span><b>${fmt(q.requestedDeadline)}</b></div><div class="metric"><span>Hard dependency</span><b>${q.hardDependency?fmt(q.hardDependency):'Ask Nathaniel'}</b></div><div class="metric"><span>Overall maturity</span><b>${overall}%</b></div></div>`)};

  render=function(){oldRender();if(state.role!=='owner'&&page==='portfolio'){page='dashboard';oldRender()}document.querySelector('[data-page="portfolio"]')?.classList.toggle('hidden',state.role!=='owner');document.querySelector('[data-page="economics"]')?.classList.toggle('hidden',state.role!=='owner')};

  function formModal(title,body,onSave){modal(`<h2>${title}</h2>${body}<div class="toolbar"><button class="btn" onclick="close()">Cancel</button><button class="btn o" id="v3save">Save</button></div>`);$('#v3save').onclick=onSave}
  document.addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
    if(b.dataset.openproject){state.active=b.dataset.openproject;page='dashboard';save('Project opened');render()}
    if(b.dataset.toggleasset){let a=p().assetRequests.find(x=>x.id===b.dataset.toggleasset);a.received=!a.received;a.status=a.received?'Received':'Requested';p().activity.push({id:uid(),date:today(),type:a.received?'Asset received':'Asset reopened',text:a.title});save('Asset updated');render()}
    if(b.dataset.editasset){let a=p().assetRequests.find(x=>x.id===b.dataset.editasset);formModal('Dropbox File Request Link',`<label class="field"><span>Dropbox File Request URL</span><input id="dlink" value="${esc(a.dropbox||'')}"></label>`,()=>{a.dropbox=$('#dlink').value;save('Dropbox link saved');close();render()})}
    if(b.dataset.editversion){let v=p().versions.find(x=>x.id===b.dataset.editversion);formModal('Review / Delivery Link',`<label class="field"><span>Dropbox, Frame.io, or Drive URL</span><input id="vlink" value="${esc(v.url||'')}"></label>`,()=>{v.url=$('#vlink').value;save('Version link saved');close();render()})}
    if(b.dataset.review){let v=p().versions.find(x=>x.id===b.dataset.review);v.status=b.dataset.status;p().activity.push({id:uid(),date:today(),type:'Review update',text:`${v.title}: ${v.status}`});save('Review updated');render()}
    if(b.dataset.togglequestion){let q=p().clarifications.find(x=>x.id===b.dataset.togglequestion);q.status=q.status==='Answered'?'Open':'Answered';save('Question updated');render()}
    if(b.dataset.v3add==='asset')formModal('New Asset Request',`<div class="grid g2"><label class="field"><span>What is needed?</span><input id="at"></label><label class="field"><span>Requested from</span><input id="af"></label><label class="field"><span>Area / deliverable</span><input id="aa"></label><label class="field"><span>Due</span><input type="date" id="ad"></label></div><label class="field"><span>Requirements</span><textarea id="ar"></textarea></label><label class="field"><span>What does it block?</span><input id="ab"></label><label class="field"><span>Dropbox File Request link</span><input id="al"></label>`,()=>{p().assetRequests.push({id:uid(),title:$('#at').value,from:$('#af').value,area:$('#aa').value,due:$('#ad').value,status:'Requested',blocks:$('#ab').value,requirements:$('#ar').value,dropbox:$('#al').value,audience:'editor',received:false});save('Asset request added');close();render()});
    if(b.dataset.v3add==='version')formModal('Add Version / Export',`<div class="grid g2"><label class="field"><span>Title</span><input id="vt"></label><label class="field"><span>Deliverable</span><input id="vd"></label><label class="field"><span>Version</span><input id="vv" placeholder="v1"></label><label class="field"><span>Reviewer</span><input id="vr"></label><label class="field"><span>Date</span><input type="date" id="vdate" value="${today()}"></label><label class="field"><span>Link</span><input id="vu"></label></div><label class="field"><span>Notes</span><textarea id="vn"></textarea></label>`,()=>{p().versions.push({id:uid(),title:$('#vt').value,deliverable:$('#vd').value,version:$('#vv').value,date:$('#vdate').value,url:$('#vu').value,status:'Ready for review',reviewer:$('#vr').value,notes:$('#vn').value,audience:'editor'});p().activity.push({id:uid(),date:today(),type:'Version created',text:$('#vt').value});save('Version added');close();render()});
    if(b.dataset.v3add==='question')formModal('Add Clarification',`<label class="field"><span>Question</span><input id="qq"></label><label class="field"><span>Ask</span><input id="qa"></label><label class="field"><span>Why it matters</span><textarea id="qi"></textarea></label>`,()=>{p().clarifications.push({id:uid(),question:$('#qq').value,ask:$('#qa').value,impact:$('#qi').value,status:'Open'});save('Question added');close();render()});
    if(b.dataset.v3add==='history')formModal('Add Activity',`<div class="grid g2"><label class="field"><span>Type</span><input id="ht"></label><label class="field"><span>Date</span><input type="date" id="hd" value="${today()}"></label></div><label class="field"><span>What happened?</span><textarea id="hx"></textarea></label>`,()=>{p().activity.push({id:uid(),date:$('#hd').value,type:$('#ht').value,text:$('#hx').value});save('Activity added');close();render()});
    if(b.dataset.v3add==='project')formModal('Add Project',`<label class="field"><span>Project name</span><input id="pn"></label><label class="field"><span>Goal</span><textarea id="pg"></textarea></label><label class="field"><span>Requested deadline</span><input type="date" id="pd"></label>`,()=>{let q=seed();q.id=uid();q.name=$('#pn').value||'Untitled WAV Project';q.goal=$('#pg').value;q.deadline=$('#pd').value;q.requestedDeadline=$('#pd').value;q.requests=[];q.waiting=[];q.people=[];q.ideas=[];q.events=[];q.files=[];q.time=[];migrateProject(q);state.projects.push(q);state.active=q.id;save('Project added');close();page='dashboard';render()});
  });
  document.addEventListener('change',e=>{if(e.target.dataset.v3bind){let k=e.target.dataset.v3bind;p()[k]=Number(e.target.value)||0;save('Saved');render()}});
  render();
})();
</script>

<script id="mobile31script">
(function(){
  const header=document.querySelector('.top');
  const brand=header?.querySelector('.brand');
  if(!header||!brand)return;
  const menu=document.createElement('button');menu.type='button';menu.className='mobile-menu-btn';menu.id='mobileMenuBtn';menu.textContent='☰ Menu';
  const tools=document.createElement('button');tools.type='button';tools.className='mobile-tools-btn';tools.id='mobileToolsBtn';tools.textContent='Tools';
  header.insertBefore(menu,brand);header.insertBefore(tools,brand.nextSibling);
  const strip=document.createElement('div');strip.className='mobile-project-strip';strip.innerHTML='<span class="mini-label">Project</span><select id="mobileProjectSelect"></select>';
  header.insertAdjacentElement('afterend',strip);
  const desktopProject=document.getElementById('projectSelect'), mobileProject=document.getElementById('mobileProjectSelect');
  function syncMobileProject(){if(desktopProject&&mobileProject){mobileProject.innerHTML=desktopProject.innerHTML;mobileProject.value=desktopProject.value}}
  menu.addEventListener('click',()=>document.body.classList.toggle('nav-open'));
  tools.addEventListener('click',()=>{document.body.classList.toggle('tools-open');tools.textContent=document.body.classList.contains('tools-open')?'Hide':'Tools'});
  document.getElementById('mobileBackdrop')?.addEventListener('click',()=>document.body.classList.remove('nav-open'));
  document.querySelector('aside')?.addEventListener('click',e=>{if(e.target.closest('button'))document.body.classList.remove('nav-open')});
  mobileProject.addEventListener('change',()=>{desktopProject.value=mobileProject.value;desktopProject.dispatchEvent(new Event('change',{bubbles:true}))});
  const obs=new MutationObserver(syncMobileProject);if(desktopProject)obs.observe(desktopProject,{childList:true,subtree:true,attributes:true});syncMobileProject();

  const econBtn=document.querySelector('[data-page="economics"]');
  if(econBtn){econBtn.dataset.page='ceo';econBtn.textContent='CEO Studio';econBtn.dataset.advanced='1'}
  if(typeof pages!=='undefined'){
    pages.ceo=()=>{
      if(state.role!=='owner') return hero('CEO Studio','Private WAV strategy, pricing, and business intelligence is available only to Jerome.')+panel('Restricted','Switch to Jerome View to access this area.','<div class="private-banner">Private WAV business intelligence</div>');
      const hrs=p().time.reduce((a,b)=>a+b.ms,0)/3600000;
      const net=p().budget-p().directCosts;
      const rate=hrs?net/hrs:0;
      const target=p().hourlyReference*p().estimatedHours;
      const extra=p().requests.filter(x=>['Revision','Requested'].includes(x.status)).length;
      return hero('CEO Studio','Your private strategy room for pricing, packages, profitability, workload, and better ways to deliver the work.')+
      '<div class="private-banner">Jerome-only. Hidden from Nathaniel and Paula / Client views.</div>'+
      '<div class="ceo-tabs"><button class="active" data-ceotab="overview">Overview</button><button data-ceotab="pricing">Pricing & Profit</button><button data-ceotab="packages">Packages</button><button data-ceotab="efficiency">Efficiency</button></div>'+
      '<section class="ceo-section active" data-ceosection="overview">'+
        panel('CEO snapshot','What the project is teaching you as a business owner.',`<div class="metrics"><div class="metric"><span>Tracked time</span><b>${hrs.toFixed(1)}h</b></div><div class="metric"><span>Effective rate</span><b>$${rate.toFixed(2)}/h</b></div><div class="metric"><span>Target labor value</span><b>$${target.toFixed(0)}</b></div><div class="metric"><span>Added / revision items</span><b>${extra}</b></div></div><div class="callout hot"><b>CEO recommendation:</b> This GEM engagement should be treated as a creative-support package—not one generic graphics line. You are contributing script development, scratch VO, music direction, animation design, graphics, and editorial assistance.</div>`)+
        panel('What to establish next','Quiet prompts that protect the work and the relationship.',`<div class="card"><h3>Clarify the Monday expectation</h3><div class="meta">Determine whether Monday means concepts, first passes, or final production-ready assets.</div></div><div class="card"><h3>Confirm technical delivery</h3><div class="meta">Resolution, frame rate, codec, alpha channel, handles, naming, and individual-file versus project-file delivery.</div></div><div class="card"><h3>Define revision responsibility</h3><div class="meta">Separate creative exploration from client-requested revisions so future pricing reflects the real workload.</div></div>`)+
      '</section>'+
      '<section class="ceo-section" data-ceosection="pricing">'+
        panel('Economics inputs','These stay inside your private project record.',`<div class="grid g3"><label class="field"><span>Project / package amount</span><input type="number" data-v3bind="budget" value="${p().budget}"></label><label class="field"><span>Amount paid</span><input type="number" data-v3bind="amountPaid" value="${p().amountPaid}"></label><label class="field"><span>Direct costs / allocation</span><input type="number" data-v3bind="directCosts" value="${p().directCosts}"></label><label class="field"><span>Reference hourly rate</span><input type="number" data-v3bind="hourlyReference" value="${p().hourlyReference}"></label><label class="field"><span>Estimated hours</span><input type="number" data-v3bind="estimatedHours" value="${p().estimatedHours}"></label></div>`)+
        panel('Profitability reading','Uses your timer and scope information.',`<div class="metrics"><div class="metric"><span>Net before labor</span><b>$${net.toFixed(0)}</b></div><div class="metric"><span>Tracked hours</span><b>${hrs.toFixed(1)}</b></div><div class="metric"><span>Effective rate</span><b>$${rate.toFixed(2)}</b></div><div class="metric"><span>Target rate</span><b>$${p().hourlyReference}</b></div></div><div class="callout ${rate&&rate<p().hourlyReference?'warn':''}"><b>Pricing signal:</b> ${rate&&rate<p().hourlyReference?'At the current pace, the work is falling below your reference rate.':'Continue tracking; the current data does not yet show a rate problem.'}</div>`)+
      '</section>'+
      '<section class="ceo-section" data-ceosection="packages">'+
        panel('Suggested package structure','A future reusable offer based on the work GEM is actually requiring.',`<div class="grid g2"><div class="card"><h3>Creative Development</h3><div class="meta">Script passes, structure notes, visual direction, scratch VO, reference research, and concept mockups.</div></div><div class="card"><h3>Motion & Graphics System</h3><div class="meta">Intro, chapter titles, lower-third style, closing animation, reusable spark language, and export preparation.</div></div><div class="card"><h3>Music & Emotional Arc</h3><div class="meta">Music concepts, options, revisions, timing notes, and delivery of approved selections.</div></div><div class="card"><h3>Editorial Support</h3><div class="meta">Timecode recommendations, supplemental editing, review notes, version review, and troubleshooting.</div></div></div><div class="callout"><b>Default scope protection:</b> Include a defined number of concepts, deliverables, and revision rounds. New chapters, new people, or major direction changes become additions rather than invisible labor.</div>`)+
        panel('Possible future offer','A starting shape—not a final price.',`<div class="card"><h3>Documentary Creative Support Package</h3><div class="meta">Creative development + one motion language + defined title/graphic package + music options + editorial consultation + two revision rounds.</div></div>`)+
      '</section>'+
      '<section class="ceo-section" data-ceosection="efficiency">'+
        panel('Efficiency opportunities','Where to reduce repeated work without reducing quality.',`<div class="card"><h3>Build one spark engine</h3><div class="meta">Create one reusable animation system, then adapt it to the intro, chapters, lower thirds, and closing.</div></div><div class="card"><h3>Lock a delivery preset</h3><div class="meta">Once Nathaniel confirms specifications, save a reusable export preset and naming pattern.</div></div><div class="card"><h3>Separate exploration from revisions</h3><div class="meta">Time early concept experiments separately so you learn how much creative development truly costs.</div></div><div class="card"><h3>Request assets by dependency</h3><div class="meta">Ask first for items that block production—final names, logo files, milestone dates, and technical specs.</div></div>`)+
        panel('Progress maturity','Clarity and production are different.',pctRow('Development clarity',p().progress.development)+pctRow('Asset readiness',p().progress.assets)+pctRow('Production execution',p().progress.production)+pctRow('Approvals',p().progress.approvals)+pctRow('Final delivery',p().progress.delivery))+
      '</section>';
    };
  }
  document.addEventListener('click',e=>{

<script id="v32upgrade">
(function(){
  const WS_DEFAULT=[
    {id:'overview',name:'Overview',icon:'⌂',description:'Whole-project status, next move, blockers, and approvals.'},
    {id:'edit',name:'Edit',icon:'✂',description:'Editorial support, scripts, timecodes, versions, and picture-lock work.'},
    {id:'graphics',name:'Graphics',icon:'◆',description:'Logos, titles, lower thirds, chapter cards, and visual systems.'},
    {id:'animation',name:'Animation',icon:'↝',description:'Motion concepts, spark behavior, revisions, and delivery-ready renders.'},

  ];
  let activeWorkspace='overview';
  function wsMigrate(q){
    q.workspaces=q.workspaces||JSON.parse(JSON.stringify(WS_DEFAULT));
    q.projectType=q.projectType||'Hybrid production project';
    q.shootReady=q.shootReady||{enabled:false,label:'Open ShootReady module',url:'',notes:'Use this for call sheet, equipment, travel, media, day-of execution, and wrap.'};
    (q.requests||[]).forEach(r=>{
      if(r.workspace)return;
      const s=((r.title||'')+' '+(r.notes||'')).toLowerCase();
      if(/music|score|soundtrack/.test(s))r.workspace='music';
      else if(/lower third|logo|title card|graphic/.test(s))r.workspace='graphics';
      else if(/animation|spark|constellation|shuttle/.test(s))r.workspace='animation';
      else if(/script|voice-over|voice over|vo|timecode|edit/.test(s))r.workspace='edit';
      else if(/shoot|camera|crew|gear|location|call time/.test(s))r.workspace='shoot';
      else if(/export|deliver|master|archive|upload/.test(s))r.workspace='delivery';
      else r.workspace='overview';
    });
  }
  state.projects.forEach(wsMigrate);save();

  const creativeLabel=[...document.querySelectorAll('aside .label')].find(x=>x.textContent.trim()==='Creative Work');
  if(creativeLabel&&!document.querySelector('[data-page="workspaces"]')){

    const b=document.createElement('button');b.type='button';b.id='exportCenterBtn';b.className='btn t top-export';b.textContent='Download / Export';toolbar.appendChild(b);
  }

  function wsById(id){return (p().workspaces||WS_DEFAULT).find(w=>w.id===id)||WS_DEFAULT[0]}
  function laneItems(id){return p().requests.filter(visible).filter(r=>id==='overview'||(r.workspace||'overview')===id)}
  function statusClass(x){if(x.status==='Blocked')return 'blocked';if(x.approval&&/Approved|Client approved|Final/.test(x.approval))return 'done';return ''}
  function laneCard(r){
    return `<div class="card focus-card ${statusClass(r)}"><div class="workspace-head"><div><h3>${esc(r.title)}</h3><div class="meta">${esc(r.notes||'No notes yet.')}</div></div><div><span class="tag ${r.status==='Blocked'?'r':r.status==='Revision'?'a':r.status==='Complete'?'g':'t'}">${esc(r.status||'Not started')}</span></div></div><div class="approval-rail"><span class="tag">${esc(r.approval||'Not sent')}</span>${r.due?`<span class="tag">Due ${fmt(r.due)}</span>`:''}${state.role==='owner'?`<button class="btn mini" data-edit="${r.id}">Edit</button><button class="btn mini" data-move-item="${r.id}">Move</button>`:''}${state.role!=='client'?`<button class="btn mini" data-approval-step="${r.id}">Advance approval</button>`:''}</div></div>`;
  }
  function workspaceOverview(){
    const groups=p().workspaces.filter(w=>w.id!=='overview').map(w=>{const a=laneItems(w.id),approved=a.filter(x=>/Approved|Client approved|Final/.test(x.approval||'')||x.status==='Complete').length;return `<div class="card"><h3>${w.icon||''} ${esc(w.name)}</h3><div class="meta">${a.length} items • ${approved} approved/complete</div><div class="progressbar"><i style="width:${a.length?Math.round(approved/a.length*100):0}%"></i></div><button class="btn" data-open-workspace="${w.id}">Open ${esc(w.name)}</button></div>`}).join('');
    return panel('Project workspaces','Enter one lane at a time. The full project remains visible from Overview.',`<div class="grid g3">${groups}</div>`)+panel('How projects fit together','ProjectFlow is the master record; specialized tools become modules inside the relevant workspace.',`<div class="callout"><b>Use ProjectFlow for every paid or meaningful job.</b><br>A shoot, an edit, a graphics package, or a hybrid job is one project. ShootReady lives inside the Shoot workspace and can still open as its own detailed module when needed.</div>`);
  }
  function shootModule(){
    const s=p().shootReady||{};
    return panel('ShootReady module','Keep detailed production planning connected to this project instead of managing a disconnected record.',`<div class="module-link"><b>${esc(s.label||'ShootReady')}</b><p class="lead">${esc(s.notes||'')}</p>${s.url?`<a class="btn t" href="${esc(s.url)}" target="_blank" rel="noopener">Open ShootReady</a>`:'<div class="callout warn">No ShootReady link has been added yet. Add the local/site link below when this project includes a shoot.</div>'}${state.role==='owner'?`<div class="grid g2" style="margin-top:12px"><label class="field"><span>Module label</span><input data-shoot-bind="label" value="${esc(s.label||'')}"></label><label class="field"><span>ShootReady URL / file link</span><input data-shoot-bind="url" value="${esc(s.url||'')}"></label><label class="field"><span>Module notes</span><textarea data-shoot-bind="notes">${esc(s.notes||'')}</textarea></label></div>`:''}</div>`);
  }
  pages.workspaces=()=>{
    wsMigrate(p());
    const w=wsById(activeWorkspace), items=laneItems(activeWorkspace), approved=items.filter(x=>/Approved|Client approved|Final/.test(x.approval||'')||x.status==='Complete').length, blocked=items.filter(x=>x.status==='Blocked').length, review=items.filter(x=>/review|requested/i.test((x.approval||'')+' '+(x.status||''))).length;
    const tabs=p().workspaces.map(x=>`<button class="${x.id===activeWorkspace?'active':''}" data-workspace-tab="${x.id}">${x.icon||''} ${esc(x.name)}</button>`).join('');
    let body=activeWorkspace==='overview'?workspaceOverview():panel(`${w.name} workspace`,w.description||'Focus only on this area.',`<div class="toolbar">${state.role==='owner'?`<button class="btn o" data-add-lane-item="${w.id}">Add ${esc(w.name)} item</button>`:''}<button class="btn t" data-export-lane="${w.id}">Export this workspace</button></div>${items.length?items.map(laneCard).join(''):'<div class="empty">No items in this workspace yet.</div>'}`);
    if(activeWorkspace==='shoot')body+=shootModule();
    if(activeWorkspace==='music')body+=panel('Music approval checkpoint','Move forward only after the purpose and selected direction are clear.',`<div class="callout"><b>Recommended gate:</b> Direction approved → option selected → revision complete → final music delivered.</div>`);
    if(activeWorkspace==='delivery')body+=panel('Final handoff checklist','A project is not finished merely because the edit is finished.',`<div class="grid g2"><div class="card"><h3>Review complete</h3><div class="meta">All required approvers and versions recorded.</div></div><div class="card"><h3>Master delivered</h3><div class="meta">Correct format, filename, and destination confirmed.</div></div><div class="card"><h3>Payment complete</h3><div class="meta">Invoice and remaining balance resolved.</div></div><div class="card"><h3>Archive verified</h3><div class="meta">Project files and final exports have durable locations.</div></div></div>`);
    return hero(`${w.name} Workspace`,activeWorkspace==='overview'?'See the full project, then enter one focused lane when it is time to work.':w.description)+`<div class="workspace-tabs">${tabs}</div><div class="workspace-summary"><div class="metric"><span>Items</span><b>${items.length}</b></div><div class="metric"><span>Approved / Done</span><b>${approved}</b></div><div class="metric"><span>In Review</span><b>${review}</b></div><div class="metric"><span>Blocked</span><b>${blocked}</b></div></div>`+body;
  };

  function download(name,content,type='application/json'){
    const a=document.createElement('a'),url=URL.createObjectURL(new Blob([content],{type}));a.href=url;a.download=name;a.hidden=true;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1500);
  }
  function safeName(s){return (s||'WAV_Project').replace(/[^a-z0-9_-]+/gi,'_').replace(/^_+|_+$/g,'')}
  function projectPacket(){const q=p();return {app:'WAV ProjectFlow Studio',version:'3.2',exportedAt:new Date().toISOString(),project:q}}
  function laneCsv(id){
    const rows=[['Workspace','Deliverable','Status','Approval','Due','Notes']];laneItems(id).forEach(r=>rows.push([wsById(r.workspace||'overview').name,r.title,r.status||'',r.approval||'',r.due||'',r.notes||'']));
    return rows.map(row=>row.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  }
  function reviewText(){const q=p();return `WAV PROJECT REVIEW PACKET\nProject: ${q.name}\nPhase: ${q.phase||''}\nRequested deadline: ${q.requestedDeadline||q.deadline||''}\nInternal target: ${q.internalTarget||''}\nBest next action: ${q.next||''}\n\nDELIVERABLES\n${q.requests.filter(visible).map(r=>`- [${r.workspace||'overview'}] ${r.title} | ${r.status||''} | ${r.approval||''}${r.due?' | Due '+r.due:''}`).join('\n')}\n\nWAITING ON\n${(q.waiting||[]).map(x=>`- ${x.title} — ${x.person}: ${x.impact}`).join('\n')}\n\nASSET REQUESTS\n${(q.assetRequests||[]).map(x=>`- ${x.title} — ${x.status}${x.blocks?' | Blocks: '+x.blocks:''}`).join('\n')}`}
  function exportModal(){
    modal(`<h2>Download / Export</h2><p class="lead">Browser autosave keeps your working copy. These downloads create durable files you can store, upload, or bring back to ChatGPT.</p><div class="export-grid"><div class="export-card"><h3>Current Project JSON</h3><p class="meta">Portable backup of this project only.</p><button class="btn o" data-export-kind="project">Download Project</button></div><div class="export-card"><h3>Full Studio Backup</h3><p class="meta">All projects, settings, time, and portfolio data.</p><button class="btn t" data-export-kind="studio">Download Everything</button></div><div class="export-card"><h3>Deliverables Spreadsheet</h3><p class="meta">CSV for the current workspace or the full project.</p><button class="btn" data-export-kind="csv">Download CSV</button></div><div class="export-card"><h3>Review Packet</h3><p class="meta">Readable text summary for Nathaniel, Paula, or ChatGPT.</p><button class="btn" data-export-kind="review">Download Packet</button></div><div class="export-card"><h3>Print / Save as PDF</h3><p class="meta">Use your browser print dialog and choose Save as PDF.</p><button class="btn" data-export-kind="print">Print Current Page</button></div></div><div class="toolbar" style="margin-top:14px"><button class="btn" data-close-export>Close</button></div>`);
  }
  function addLaneItem(id){
    modal(`<h2>Add to ${esc(wsById(id).name)}</h2><label class="field"><span>Deliverable / task</span><input id="laneTitle"></label><label class="field"><span>Notes</span><textarea id="laneNotes"></textarea></label><label class="field"><span>Due</span><input type="date" id="laneDue"></label><div class="toolbar"><button class="btn" data-close-export>Cancel</button><button class="btn o" id="saveLaneItem">Add</button></div>`);
    document.getElementById('saveLaneItem').onclick=()=>{p().requests.push({id:uid(),title:document.getElementById('laneTitle').value||'New item',status:'Not started',approval:'Not sent',due:document.getElementById('laneDue').value,audience:'editor',notes:document.getElementById('laneNotes').value,workspace:id});save('Workspace item added');close();render()};
  }
  function moveItem(id){const r=p().requests.find(x=>x.id===id);modal(`<h2>Move Deliverable</h2><label class="field"><span>Workspace</span><select id="moveWorkspace">${p().workspaces.filter(x=>x.id!=='overview').map(w=>`<option value="${w.id}" ${r.workspace===w.id?'selected':''}>${esc(w.name)}</option>`).join('')}</select></label><div class="toolbar"><button class="btn" data-close-export>Cancel</button><button class="btn o" id="saveMove">Move</button></div>`);document.getElementById('saveMove').onclick=()=>{r.workspace=document.getElementById('moveWorkspace').value;save('Deliverable moved');close();render()}}
  function advanceApproval(id){const r=p().requests.find(x=>x.id===id),steps=['Not sent','Ready for review','Awaiting Nathaniel','Changes requested','Approved by Nathaniel','Ready for Paula / Client','Client approved','Final delivered'];let i=steps.indexOf(r.approval);r.approval=steps[(i+1+steps.length)%steps.length];if(r.approval==='Final delivered')r.status='Complete';save('Approval updated');render()}

  document.addEventListener('click',e=>{
    const b=e.target.closest('button');if(!b)return;
    if(b.id==='exportCenterBtn'){exportModal();return}

    if(b.dataset.exportLane){download(`${safeName(p().name)}_${b.dataset.exportLane}_workspace.csv`,laneCsv(b.dataset.exportLane),'text/csv');toast('Workspace exported');return}

      const base=safeName(p().name),k=b.dataset.exportKind;
      if(k==='project')download(`${base}_ProjectFlow.json`,JSON.stringify(projectPacket(),null,2));

      if(k==='csv')download(`${base}_${activeWorkspace}_deliverables.csv`,laneCsv(activeWorkspace),'text/csv');

  const prevRender=render;
  render=function(){state.projects.forEach(wsMigrate);prevRender();const ex=document.getElementById('exportCenterBtn');if(ex)ex.classList.toggle('hidden',state.role!=='owner')};
  render();
})();
</script>

  if(allowedProjects.length&&!allowedProjects.some(q=>q.id===state.active))state.active=allowedProjects[0].id;
  const select=document.getElementById('projectSelect');if(select){select.innerHTML=allowedProjects.map(q=>`<option value="${q.id}" ${q.id===state.active?'selected':''}>${esc(q.name)}</option>`).join('')}
  const allowedPages=state.role==='client'?['dashboard','assets','versions']:['dashboard','deliverables','assets'];
  document.querySelectorAll('aside [data-page]').forEach(b=>b.classList.toggle('hidden',!allowedPages.includes(b.dataset.page)));
  const labels={dashboard:'Home',deliverables:'Production / Deliverables',assets:state.role==='client'?'Files & Review':'Files & Handoff',versions:'Reviews & Approvals'};
  document.querySelectorAll('aside [data-page]').forEach(b=>{if(labels[b.dataset.page])b.textContent=labels[b.dataset.page]});
  document.querySelector('.timer')?.classList.add('hidden');document.getElementById('exportCenterBtn')?.classList.add('hidden');
}

(async function initializePreservedIntegration(){
  await WAVShared.ensureShootReadySeed('./data/redcat-shootready.json');syncRedcatModule();
  const preservedRender=render;render=function(){preservedRender();enforceSimpleRoleShell()};
  const toolbar=document.querySelector('header.top .toolbar');
  if(toolbar&&!document.getElementById('switchLogin')){const b=document.createElement('button');b.id='switchLogin';b.className='btn switch-login';b.textContent='Switch Login';b.onclick=()=>{sessionStorage.removeItem('wav-projectflow-mock-login');showLoginGate(true)};toolbar.prepend(b)}
  window.addEventListener('focus',()=>{syncRedcatModule()});
  document.addEventListener('visibilitychange',()=>{if(!document.hidden)syncRedcatModule()});
  render();showLoginGate();
})();
</script>
